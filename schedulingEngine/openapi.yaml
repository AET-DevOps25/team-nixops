openapi: 3.0.1
info:
  title: Scheduling API
  description: API for creating schedules based on course events and availability.
  version: 1.0.0
paths:
  /api/schedule:
    post:
      summary: Create a schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Query'
      responses:
        '200':
          description: Successfully generated schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
components:
  schemas:
    Query:
      type: object
      properties:
        courses:
          type: array
          items:
            $ref: '#/components/schemas/Course'
        availability:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityBlocker'
        ectsTarget:
          type: integer
      required:
        - courses
        - ectsTarget

    Course:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        score:
          type: integer
      required:
        - events
        - score

    AvailabilityBlocker:
      type: object
      properties:
        timeSlot:
          $ref: '#/components/schemas/TimeSlot'
      required:
        - timeSlot

    Event:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
        timeSlot:
          $ref: '#/components/schemas/TimeSlot'
      required:
        - title
        - type
        - timeSlot

    TimeSlot:
      type: object
      properties:
        date:
          type: string
          format: date
        startTime:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
        endTime:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
      required:
        - date
        - startTime
        - endTime

    Response:
      type: object
      properties:
        scheduled:
          $ref: '#/components/schemas/Schedule'
        complement:
          type: array
          items:
            $ref: '#/components/schemas/Event'
      required:
        - scheduled

    Schedule:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        score:
          type: integer
        collisions:
          type: array
          items:
            $ref: '#/components/schemas/Collision'
      required:
        - events
        - score
        - collisions

    Collision:
      type: object
      properties:
        primary:
          $ref: '#/components/schemas/Event'
        secondary:
          $ref: '#/components/schemas/Event'
        duration:
          type: string
          format: duration
      required:
        - primary
        - secondary
        - duration

